version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mernlearning-db
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mernlearning

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mernlearning-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/mernlearning
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mernlearning-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

volumes:
  mongo_data:
